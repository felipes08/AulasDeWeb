<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantica</title>
    <style>
        header{
            background-color: rgb(173, 173, 173);
            text-align: center;
            width: 80%;
            margin: auto;
            padding: 10px;
        }
        nav{
            background-color: rgb(16, 170, 2);
            width: 80%;
            margin: auto;
        }
        nav>div{
            display: inline;
        }
        article{
            border: 1px solid black;
            width: 60%;
        }
        aside{
            /*float: right;*/
            background-color: bisque;
        }
        footer{
            background-color: cadetblue;
        }

        /*seletor de classe*/
        .item{
            color: white;
        }

        /*seletor de id*/
        #topo{
            color: blue;
        }

        span.negrito{
            font-weight: bolder;
        }
        span.tachado{
            text-decoration: line-through;
        }
    </style>
</head>
<body>
<header id="topo">
    <h1 id="titulo-principal">Blog de Tecnologia do IFSP</h1>
    <nav id="menu-principal">
        <div class="item">Home</div>
        <div class="item">Projetos</div>
        <div class="item">Contato</div>
    </nav>
</header>

    <main id="corpo-site">
        <article id="noticia-destaque">
            <h2 class="titulo-post">Lançamento do Novo Curso</h2>
            <div class="texto">Conteúdo detalhado sobre o curso <span class="negrito">TADS</span> no <span class="negrito">IFSP</span> </div>
            <div class="autor">Escrito por: Professor <span class="negrito tachado"> Bianca</span></div>
        </article>
            
        <aside id="barra-lateral">
            <div class="titulo-lateral">Links Úteis</div>
            <div class="link">Manual do Aluno</div>
        </aside>   
    </main>


<footer id="rodape">
    <div class="info">2026 - IFSP Campinas</div>
</footer>
</body>
</html>
