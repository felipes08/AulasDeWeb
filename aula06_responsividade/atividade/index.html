<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Responsivo</title>
    <link rel = "stylesheet" href="style.css">
</head>
<body>

    <h1>Finalizar Compra</h1>

    <form action="#" method="POST">
        <div class="layout-desktop">

            <fieldset> 
                <legend>Identificação</legend>

                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" required>

                <label for="email">Email:</label>
                <input type="email" id="email" required>

            </fieldset>

            <fieldset>

                <legend>Entrega</legend>
                <div class="layout-tablet">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" required>
                
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" required>
                </div>
                <label>Estado:
                    <select required>
                        <option value="">Selecione...</option>
                        <option value="SP">SP</option>
                        <option value="RJ">RJ</option>
                        <option value="MG">MG</option>
                        <option value="PR">PR</option>
                        <option value="SC">SC</option>
                    </select>    
                </label>
            </fieldset>

            <fieldset>
                <legend>Pagamento</legend>

                <label>
                    <input type="radio" name="pagamento" value="credito" required>
                Cartão de Credito</label>
                
                <label>
                    <input type="radio" name="pagamento" value="pix" required>
                Pix</label>

                <label>Código CVV:</label>
                <input type="number" max="999" required>
                
                
            </fieldset>
        </div>

        <button type="submit">Finalizar Compra</button>
    </form>
    
</body>
</html>
