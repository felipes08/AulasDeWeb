<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Buffet Pro</title>
</head>
<body>
    <h2>Simulador de Buffet Pro</h2>
    <form>
        <div>
            <label for="pessoas">Quantidade de Pessoas
                <input type="number" name="pessoas" id="pessoas" placeholder="Seu Nome">
            </label>
        </div>

        <div>
            <label><input type="checkbox" name="adicionais" id="adicionais" value="500">Decoração (R$500,00)</label> 
            <label><input type="checkbox" name="adicionais" id="adicionais" value="800">DJ Profissional (R$800,00)</label>
            <label><input type="checkbox" name="adicionais" id="adicionais" value="30">Open Bar (R$30,00/pessoa)</label>
        </div>

        <div>
            <p>Orçamento<span id="orcamento">R$ 0,00</span></p>
        </div>
        
    </form>
    
</body>
</html>
